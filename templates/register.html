{% extends "base.html" %}

{% block title %}Register - Smart Library{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card animate-fade-in">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus display-4"></i>
                    <h2 class="mt-3">Create Account</h2>
                    <p>Join Smart Library and discover great books</p>
                </div>
                
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="search-box">
                            <i class="bi bi-person"></i>
                            <input type="text" class="form-control" id="username" name="username" required 
                                   placeholder="Choose a username" minlength="3">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <div class="search-box">
                            <i class="bi bi-envelope"></i>
                            <input type="email" class="form-control" id="email" name="email" required 
                                   placeholder="Enter your email">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="search-box">
                            <i class="bi bi-lock"></i>
                            <input type="password" class="form-control" id="password" name="password" required 
                                   placeholder="Create a password" minlength="6">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-person-plus me-2"></i>Create Account
                    </button>
                </form>
                
                <div class="text-center">
                    <p class="mb-0">
                        Already have an account?
                        <a href="{{ url_for('login') }}">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
