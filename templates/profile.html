{% extends "base.html" %}

{% block title %}Profile - Smart Library{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card animate-fade-in">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" 
                         style="width: 100px; height: 100px;">
                        <i class="bi bi-person display-3 text-white"></i>
                    </div>
                    <h2>{{ user.username }}</h2>
                    <p>{{ user.email }}</p>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="stat-card">
                            <div class="stat-number">{{ stats.total_ratings or 0 }}</div>
                            <div>Books Rated</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="stat-card">
                            <div class="stat-number">{{ "%.1f"|format(stats.avg_rating or 0) }}</div>
                            <div>Average Rating</div>
                        </div>
                    </div>
                </div>
                
                <h4 class="mb-3">Edit Profile</h4>
                <form method="POST" action="{{ url_for('profile') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" 
                               value="{{ user.email }}" required>
                    </div>
                    <div class="mb-4">
                        <label for="bio" class="form-label">Bio</label>
                        <textarea class="form-control" id="bio" name="bio" rows="3" 
                                  placeholder="Tell us about yourself...">{{ user.bio or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-lg me-2"></i>Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
